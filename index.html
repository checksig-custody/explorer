<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CheckSig Token Explorer</title>
    <meta
      name="description"
      content="CheckSig Token Explorer — a light block explorer for CheckSig Cosmos SDK chains, fetching data live from LCD/RPC endpoints."
    />
    <link rel="stylesheet" type="text/css" href="/loader.css" />
  </head>
  <body>
    <div id="app">
      <div id="loading-bg">
        <div class="loading-logo">
          <img src="/logo.svg" alt="CheckSig" width="150" />
        </div>
        <div class="pre-loading">
          <div class="effect-1 effects"></div>
          <div class="effect-2 effects"></div>
          <div class="effect-3 effects"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ping-pub/widget@latest/dist/widget.min.js"></script>
  </body>
</html>
